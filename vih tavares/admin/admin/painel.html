<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Açaí Express</title>

    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="topo">

    <h1>🍇 Painel Administrativo</h1>

    <button onclick="sair()">
        Sair
    </button>

</header>

<section class="painel">

    <h2>Controle de Estoque</h2>

    <table>

        <thead>

            <tr>
                <th>Produto</th>
                <th>Preço (R$)</th>
                <th>Estoque</th>
                <th>Ação</th>
            </tr>

        </thead>

        <tbody>

            <tr>

                <td>Açaí 300ml</td>

                <td>
                    <input type="number" id="preco300" value="14.90" step="0.01">
                </td>

                <td>
                    <input type="number" id="estoque300" value="20">
                </td>

                <td>
                    <button onclick="salvarProduto('300ml')">
                        Salvar
                    </button>
                </td>

            </tr>

            <tr>

                <td>Açaí 500ml</td>

                <td>
                    <input type="number" id="preco500" value="19.90" step="0.01">
                </td>

                <td>
                    <input type="number" id="estoque500" value="15">
                </td>

                <td>
                    <button onclick="salvarProduto('500ml')">
                        Salvar
                    </button>
                </td>

            </tr>

            <tr>

                <td>Açaí 700ml</td>

                <td>
                    <input type="number" id="preco700" value="25.90" step="0.01">
                </td>

                <td>
                    <input type="number" id="estoque700" value="10">
                </td>

                <td>
                    <button onclick="salvarProduto('700ml')">
                        Salvar
                    </button>
                </td>

            </tr>

            <tr>

                <td>Açaí 1 Litro</td>

                <td>
                    <input type="number" id="preco1000" value="34.90" step="0.01">
                </td>

                <td>
                    <input type="number" id="estoque1000" value="8">
                </td>

                <td>
                    <button onclick="salvarProduto('1000ml')">
                        Salvar
                    </button>
                </td>

            </tr>

        </tbody>

    </table>

</section>

<section class="painel">

    <h2>Adicionar Novo Produto</h2>

    <input type="text" id="novoNome" placeholder="Nome do Produto">

    <input type="number" id="novoPreco" placeholder="Preço">

    <input type="number" id="novoEstoque" placeholder="Quantidade">

    <button onclick="adicionarProduto()">
        Adicionar Produto
    </button>

</section>

<script src="admin.js"></script>

</body>
</html>
